services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adapterly}
      POSTGRES_USER: ${POSTGRES_USER:-adapterly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adapterly}"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build: .
    entrypoint: ["./docker/entrypoint.sh"]
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind", "0.0.0.0:8000",
        "--workers", "3",
        "--timeout", "120",
      ]
    env_file: .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-adapterly}
      DB_USER: ${POSTGRES_USER:-adapterly}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy

  fastapi:
    build: .
    command:
      [
        "uvicorn",
        "fastapi_app.main:app",
        "--host", "0.0.0.0",
        "--port", "8001",
        "--workers", "2",
      ]
    env_file: .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-adapterly}
      DB_USER: ${POSTGRES_USER:-adapterly}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - django
      - fastapi

volumes:
  postgres_data:
  static_files:
